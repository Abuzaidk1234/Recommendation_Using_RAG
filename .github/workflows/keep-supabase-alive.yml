name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Strip accidental quotes and invisible newlines
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '"\n\r ')
          CLEAN_KEY=$(echo "$SUPABASE_KEY" | tr -d '"\n\r ')
          
          echo "Pinging database..."
          curl -s "${CLEAN_URL}/rest/v1/chat_history?select=id&limit=1" \
            -H "apikey: ${CLEAN_KEY}" \
            -H "Authorization: Bearer ${CLEAN_KEY}"
