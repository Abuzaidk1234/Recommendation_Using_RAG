name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # Strip accidental quotes and invisible newlines from the key
          CLEAN_KEY=$(echo "$SUPABASE_KEY" | tr -d '"\n\r ')
          
          echo "Pinging database..."
          # The URL is hardcoded here so we don't rely on the GitHub Secret for it
          curl -s -f "https://piorsvqcmgwrcampfjqg.supabase.co/rest/v1/chat_history?select=id&limit=1" \
            -H "apikey: ${CLEAN_KEY}" \
            -H "Authorization: Bearer ${CLEAN_KEY}"
